    <script>
        const API_BASE = 'https://pet-production-28ba.up.railway.app/api';
        let chartInstance = null;
        let allAnnouncements = [];
        let allViolations = [];

        // Toast
        function showToast(msg, type = 'success') {
            const t = document.getElementById('msg-toast');
            t.textContent = msg;
            t.className = `msg-toast ${type === 'error' ? 'bg-[#EF4444]' : 'bg-[#10B981]'}`;
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 2800);
        }

        // 通用加载数据
        async function fetchData(url) {
            const token = localStorage.getItem('petx_token') || '';
            const res = await fetch(url, { 
                headers: { 'x-auth-token': token },

        function generateHeatmapData() {
            // 武汉理工大学南湖校区周边的真实社区位置，所有社区都向上移动了2公里
            const communities = [
                { name: "武汉理工大学南湖校区", center: [114.387, 30.508], density: 80 },
                { name: "南湖名都A区", center: [114.392, 30.503], density: 60 },
                { name: "南湖名都B区", center: [114.395, 30.500], density: 55 },
                { name: "南国南湖郡", center: [114.380, 30.506], density: 70 },
                { name: "保利中央公馆", center: [114.375, 30.513], density: 75 },
                { name: "金地格林小城", center: [114.370, 30.508], density: 65 },
                { name: "万科金色城市", center: [114.395, 30.513], density: 50 },
                { name: "丽岛2046", center: [114.385, 30.498], density: 45 }
            ];
            
            const heatData = [];
            
            // 为每个社区生成热力点
            communities.forEach(community => {
                const pointCount = Math.floor(community.density / 10);
                
                // 生成社区中心的高密度热力点
                for (let i = 0; i < pointCount; i++) {
                    const offsetLng = (Math.random() - 0.5) * 0.005;
                    const offsetLat = (Math.random() - 0.5) * 0.005;
                    
                    heatData.push({
                        lng: community.center[0] + offsetLng,
                        lat: community.center[1] + offsetLat,
                        count: Math.floor((community.density / 100) * 40) + 10
                    });
                }
                
                // 生成社区周边的低密度热力点
                for (let i = 0; i < Math.floor(pointCount / 2); i++) {
                    const offsetLng = (Math.random() - 0.5) * 0.01;
                    const offsetLat = (Math.random() - 0.5) * 0.01;
                    
                    heatData.push({
                        lng: community.center[0] + offsetLng,
                        lat: community.center[1] + offsetLat,
                        count: Math.floor((community.density / 100) * 20) + 5
                    });
                }
            });
            
            return heatData;
        }

        };

        // 保存违规
        document.getElementById('save-vio').onclick = async () => {
            const payload = {
                id: document.getElementById('vio-id').value || null,
                petName: document.getElementById('vio-pet-name').value.trim(),
                ownerTel: document.getElementById('vio-owner-tel').value.trim(),
                violation_type_id: document.getElementById('vio-type').value,
                violationTime: document.getElementById('vio-time').value,
                handleNote: document.getElementById('vio-desc').value,
                handleStatus: document.getElementById('vio-status').value,
                handleResult: document.getElementById('vio-result').value
            };

            if (!payload.violation_type_id || !payload.violationTime) {
                showToast('请填写完整信息', 'error');
                return;
            }

            const res = await postData(`${API_BASE}/admin/saveViolation`, payload);
            if (res.code === 200) {
                showToast('保存成功！');
                document.getElementById('modal-overlay').classList.add('hidden');
                document.getElementById('vio-modal').classList.add('hidden');
                // 清空表单
                document.getElementById('vio-id').value = '';
                document.getElementById('vio-pet-name').value = '';
                document.getElementById('vio-owner-tel').value = '';
                document.getElementById('vio-desc').value = '';
                document.getElementById('vio-result').value = '';
                
                loadViolations();
                loadDashboard();
            } else {
                showToast(res.msg || '保存失败', 'error');
            }
        };

        async function deleteAnnouncement(id) { if(confirm('确定删除？')) { await postData(`${API_BASE}/admin/deleteAnnouncement`, {id}); loadAnnouncements(); } }
        async function deleteViolation(id) { if(confirm('确定删除？')) { await postData(`${API_BASE}/admin/deleteViolation`, {id}); loadViolations(); loadDashboard(); } }

        // 关闭模态
        document.querySelectorAll('.close-modal').forEach(btn => {
            btn.addEventListener('click', () => {
                document.getElementById('modal-overlay').style.display = 'none';
                document.getElementById('ann-modal').classList.add('hidden');
                document.getElementById('vio-modal').classList.add('hidden');
            });
        });

        // 初始化
        window.onload = async () => {
            await loadViolationTypes();
            await loadDashboard();
            await loadHeatmap();
            await loadTrendChart();
            await loadAnnouncements();
            await loadViolations();

            document.getElementById('admin-logout').onclick = async () => {
                if(confirm('确认退出？')) {
                    localStorage.removeItem('petx_token');
                    window.location.href = 'login.html';
                }
            };
        };
    </script>
    <script src="agent-widget.js"></script>
    <script src="page-transition.js"></script>
    <script src="https://webapi.amap.com/maps?v=2.0&key=949906fe9f2f9cec005d6fec68435bdd&plugin=AMap.HeatMap"></script>
</body>
</html>
