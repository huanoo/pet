    <script>
        async function loadScoreDetail() {
            try {
                const token = localStorage.getItem('petx_token') || '';
                const res = await fetch('https://pet-production-28ba.up.railway.app/api/user/score', {
                    headers: { 'x-auth-token': token },
                    credentials: 'include'
                });
                const json = await res.json();
                
                if (json.code === 200) {
                    const d = json.data;
                    renderPage(d);
                } else {
                    alert('请先登录');
                    window.location.href = 'login.html';
                }
            } catch (e) {
                console.error(e);
            }
        }

        function renderPage(data) {
            // 1. 核心分数
            document.getElementById('total-score').innerText = data.total;
            const level = data.total >= 100 ? '🌟 模范铲屎官' : (data.total >= 80 ? '👍 优秀养宠人' : '⚠️ 需加强管理');
            const levelEl = document.getElementById('score-level');
            levelEl.innerText = level;
            levelEl.className = `inline-block px-4 py-1 rounded-full text-sm font-bold ${data.total >= 90 ? 'bg-green-100 text-green-700' : 'bg-yellow-100 text-yellow-700'}`;

            // 2. 扣分列表
            const list = document.getElementById('deduction-list');
            const map = {
                leash: '未牵绳',
                feces: '未清理粪便',
                noise: '宠物扰民',
                vaccine: '疫苗逾期',
                cert: '无证养犬',
                public_area: '闯入公共区',
                other: '其他违规'
            };
            
            let html = '';
            let totalDeduction = 0;
            
            for (let k in data.deductions) {
                const val = data.deductions[k];
                if (val > 0) {
                    totalDeduction += val;
                    html += `
                        <div class="flex justify-between items-center p-3 bg-red-50 rounded-lg">
                            <span class="text-gray-700">${map[k] || k}</span>
                            <span class="font-bold text-red-500">-${val}</span>
                        </div>
                    `;
                }
            }
            
            if (html === '') {
                html = '<div class="text-center text-gray-400 py-4">太棒了！暂无扣分记录 🎉</div>';
            }
            list.innerHTML = html;

            // 3. 图表
            const ctx = document.getElementById('scoreChart').getContext('2d');
            new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['当前得分', '累计扣分', '累计奖励'],
                    datasets: [{
                        data: [data.total, totalDeduction, data.bonus],
                        backgroundColor: ['#c2410c', '#EF4444', '#10B981'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { position: 'bottom' }
                    }
                }
            });
        }

        loadScoreDetail();
    </script>
