    <style>

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .card-hover:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(154, 72, 42, 0.1); }

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap">
</head>
<body class="bg-neutral-50 min-h-screen">
    <!-- 导航栏 - 改为参考代码的设计风格 -->
    <nav class="bg-[#9A482A] shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-20 items-center">
                <!-- 左侧Logo区域：改为参考代码的布局 -->
                <div class="flex items-center gap-3">
                    <div class="w-12 h-12 bg-white rounded-full flex items-center justify-center shadow-sm border-2 border-[#7c3c22]">
                        <!-- 改用Font Awesome 6.x的小狗图标，替换原有返回箭头 -->
                        <i class="fa-solid fa-dog text-[#9A482A] text-2xl"></i>
                    </div>
                    <div class="flex items-center gap-2">

                        <span class="text-white text-sm">🐾</span>
                        <span class="text-xl font-medium text-[#F8E9D8] cute-font">文明系数趋势详情</span>
                    </div>
                </div>
                
                <!-- 右侧用户+返回按钮区域：新增参考代码的布局 -->
                <div class="flex items-center space-x-6">
                    <div class="flex items-center gap-2 text-white">
                        <i class="fa-solid fa-user-circle text-[#F8E9D8] text-xl"></i>
                        <span class="cute-font">管理员</span>
                    </div>
                    <!-- 保留原有跳转功能，仅修改按钮样式为参考代码风格 -->
                    <button onclick="window.location.href='admin.html'" 
                            class="py-2 px-5 rounded-full bg-white text-[#9A482A] font-medium cute-font hover:bg-[#F8E9D8] hover:shadow-lg transition-all duration-300 flex items-center gap-2">
                        <i class="fa-solid fa-arrow-left"></i>
                        <span>返回首页</span>

                    </button>

            </div>
        </div>

<main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div class="mb-8">
        <div class="mb-4">
            <!-- 标题+筛选器同行布局：标题居中 + 筛选器右对齐 -->
            <div class="relative">
                <!-- 标题行：纯居中显示 -->
                <h2 class="text-3xl font-bold text-[#A65233] flex items-center justify-center gap-2 cute-font" style="letter-spacing: 2px;">
                    <i class="fa-solid fa-chart-line text-[#E68A48]"></i>
                    各社区文明系数趋势对比
                </h2>
                <!-- 筛选器：绝对定位右对齐，与标题同行 -->
                <div class="absolute top-0 right-0 bg-[#9A482A] p-2 rounded-xl shadow-sm flex gap-2">
                    <select id="community-select" onchange="updateChart()" class="bg-transparent border-none text-white font-bold cute-font focus:ring-0 cursor-pointer outline-none px-4 py-2">
                        <option value="all">显示所有社区对比</option>
                        <!-- 动态加载 -->
                    </select>
                </div>
            </div>
            
            <!-- 副标题：居中显示 -->
            <p class="text-gray-500 cute-font text-center mb-4">近6个月数据动态监测与分析</p>
        </div>
    </div>




     <!-- 主要图表区域 -->
<div class="bg-white p-8 rounded-2xl shadow-lg hover:shadow-lg hover:-translate-y-1 transition-all duration-300 border-4 border-[#9A482A] overflow-hidden relative mb-8"
     style="background: linear-gradient(135deg, #A65233/10, #A65233/5, #A65233/1);">
    <!-- 背景狗爪装饰：均匀分布多个浅咖色大狗爪 -->
    <div class="absolute inset-0 z-0 opacity-5 pointer-events-none">
        <!-- 左上 -->
        <div class="absolute top-8 left-8 transform -rotate-15">
            <i class="fa-solid fa-paw text-[100px] text-[#D4B190]"></i>
        </div>
        <!-- 右上 -->
        <div class="absolute top-8 right-8 transform rotate-15">
            <i class="fa-solid fa-paw text-[100px] text-[#D4B190]"></i>
        </div>
        <!-- 左下 -->
        <div class="absolute bottom-8 left-8 transform rotate-5">
            <i class="fa-solid fa-paw text-[100px] text-[#D4B190]"></i>
        </div>
        <!-- 右下 -->
        <div class="absolute bottom-8 right-8 transform -rotate-5">
            <i class="fa-solid fa-paw text-[100px] text-[#D4B190]"></i>
        </div>
        <!-- 中间 -->
        <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 rotate-20 opacity-3">
            <i class="fa-solid fa-paw text-[150px] text-[#D4B190]"></i>
        </div>
    </div>
    
    <!-- 内容容器：相对定位，层级高于背景 -->
    <div class="relative z-10">
        <div class="chart-container relative z-10">
            <canvas id="trend-chart"></canvas>
        </div>
    </div>
</div>

       <!-- 数据解读卡片 -->
<div class="grid grid-cols-1 md:grid-cols-3 gap-6" id="analysis-cards">
    <!-- 动态填充的加载状态卡片：匹配寄养卡片设计风格 -->
    <div class="col-span-full bg-white p-8 rounded-2xl shadow-lg hover:shadow-lg hover:-translate-y-1 transition-all duration-300 border-4 border-[#9A482A] overflow-hidden relative"
         style="background: linear-gradient(135deg, #A65233/10, #A65233/5, #A65233/1);">
        <!-- 狗爪背景装饰：匹配寄养卡片风格 -->
        <div class="absolute bottom-0 right-0 text-[#D4B190]/10 z-0">
            <i class="fa-solid fa-paw text-[120px] -rotate-15 translate-x-1/5 translate-y-1/4"></i>
        </div>
        
        <!-- 内容容器：相对定位，层级高于背景 -->
        <div class="relative z-10 text-center py-12">
            <div class="spinner mx-auto mb-4"></div>
            <p class="text-gray-400 cute-font">正在分析数据...</p>
        </div>
    </div>
</div>
</main>

    <script>
        const API_BASE = 'http://127.0.0.1:3000/api';
        let mainChart = null;
        let allCommunityData = [];

        async function fetchTrendData() {
            try {
                // 先获取社区列表
                const token = localStorage.getItem('petx_token') || '';
                const listRes = await fetch(`${API_BASE}/admin/communityListStats`, {
                    headers: { 'x-auth-token': token },
                    credentials: 'include'
                });
                const listJson = await listRes.json();
                
                if (listJson.code !== 200) throw new Error('Failed to load communities');
                
                // 获取各社区列表基础数据
                const communities = listJson.data;
                const months = [];
                // 生成最近6个月的月份标签
                for(let i=5; i>=0; i--) {
                    const d = new Date();
                    d.setMonth(d.getMonth() - i);
                    months.push(`${d.getMonth()+1}月`);
                }

                // 模拟生成历史数据 (实际应调用后端 /api/admin/civilizationTrend?communityId=xxx)
                // 这里为了演示效果，我们在前端基于当前分数反推生成趋势
                allCommunityData = communities.map(c => {
                    const currentScore = parseFloat(c.score);
                    // 模拟历史数据：基于当前分数，加入随机波动
                    const history = [];
                    for(let i=0; i<6; i++) {
                        // 越久远的数据波动越大，最近的数据越接近真实值
                        const noise = (Math.random() - 0.5) * (5 - i); 
                        let val = currentScore + noise;
                        // 确保在合理范围内 (60-100)
                        val = Math.max(60, Math.min(100, val));
                        history.push(parseFloat(val.toFixed(1)));
                    }
                    // 强制最后一个点为当前真实分数
                    history[5] = currentScore;
                    
                    const change = (history[5] - history[4]).toFixed(1);

                    return {
                        id: c.id,
                        name: c.name,
                        history: history,
                        trend: change >= 0 ? 'up' : 'down',
                        change: Math.abs(change)
                    };
                });

                initSelect();
                initChart(months);
                renderAnalysisCards();

            } catch (e) {
                console.error(e);
                document.getElementById('analysis-cards').innerHTML = '<p class="col-span-full text-center text-red-500">数据加载失败，请刷新重试</p>';
            }
        }

        function initSelect() {
            const sel = document.getElementById('community-select');
            // 清空旧选项（保留第一个默认项）
            sel.innerHTML = '<option value="all">显示所有社区对比</option>';
            allCommunityData.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c.id;
                opt.textContent = c.name;
                sel.appendChild(opt);
            });
        }

        function initChart(labels) {
            const ctx = document.getElementById('trend-chart').getContext('2d');
            
            // 预设颜色池，循环使用
            const colors = [
                '#9A482A', // 主色
                '#E68A48', // 辅色
                '#F59E0B', // 黄
                '#10B981', // 绿
                '#3B82F6', // 蓝
                '#6366F1', // 紫
                '#8B5CF6', 
                '#EC4899'
            ];

            const datasets = allCommunityData.map((c, index) => ({
                label: c.name,
                data: c.history,
                borderColor: colors[index % colors.length],
                backgroundColor: 'transparent',
                tension: 0.4,
                borderWidth: 3,
                pointRadius: 4,
                pointHoverRadius: 6,
                pointBackgroundColor: '#fff',
                pointBorderWidth: 2
            }));

            mainChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: datasets
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'index',
                        intersect: false,
                    },
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                font: { family: "'ZCOOL KuaiLe', sans-serif", size: 12 },
                                usePointStyle: true,
                                padding: 20
                            }
                        },
                        tooltip: {
                            backgroundColor: 'rgba(255, 255, 255, 0.95)',
                            titleColor: '#9A482A',
                            bodyColor: '#666',
                            borderColor: '#E68A48',
                            borderWidth: 1,
                            titleFont: { family: "'ZCOOL KuaiLe', sans-serif", size: 14 },
                            bodyFont: { family: "'Microsoft YaHei', sans-serif" },
                            padding: 10,
                            displayColors: true,
                            boxPadding: 4
                        }
                    },
                    scales: {
                        y: {
                            min: 60,
                            max: 100,
                            grid: { color: '#f3f4f6' },
                            ticks: { font: { family: "'Microsoft YaHei', sans-serif" } }
                        },
                        x: {
                            grid: { display: false },
                            ticks: { font: { family: "'ZCOOL KuaiLe', sans-serif" } }
                        }
                    }
                }
            });
        }

        function updateChart() {
            const selectedId = document.getElementById('community-select').value;
            
            // Chart.js 显隐逻辑
            allCommunityData.forEach((c, i) => {
                const datasetMeta = mainChart.getDatasetMeta(i);
                if (selectedId === 'all' || c.id == selectedId) {
                    datasetMeta.hidden = false;
                } else {
                    datasetMeta.hidden = true;
                }
            });
            mainChart.update();
        }

      function renderAnalysisCards() {
    const container = document.getElementById('analysis-cards');
    container.innerHTML = allCommunityData.map(c => `
        <div class="bg-white p-8 rounded-2xl shadow-lg hover:shadow-lg hover:-translate-y-1 transition-all duration-300 border-4 border-[#9A482A] overflow-hidden relative group"
             style="background: linear-gradient(135deg, #A65233/10, #A65233/5, #A65233/1);">
            <!-- 狗爪背景装饰：匹配加载卡片风格 -->
            <div class="absolute bottom-0 right-0 text-[#D4B190]/10 z-0">
                <i class="fa-solid fa-paw text-[120px] -rotate-15 translate-x-1/5 translate-y-1/4"></i>
            </div>
            
            <!-- 原有右上角装饰块：保留但调整层级，避免与狗爪冲突 -->
            <div class="absolute top-0 right-0 w-16 h-16 bg-[#A65233]/5 rounded-bl-full -mr-8 -mt-8 transition-transform group-hover:scale-150 z-0"></div>
            
            <!-- 内容容器：相对定位，层级高于背景 -->
            <div class="relative z-10">
                <div class="flex justify-between items-start mb-4">
                    <h3 class="text-lg font-bold text-gray-800 cute-font group-hover:text-[#A65233] transition-colors">${c.name}</h3>
                    <span class="px-2 py-1 rounded text-xs font-bold ${c.trend === 'up' ? 'bg-green-100 text-green-600' : 'bg-red-100 text-red-600'}">
                        ${c.trend === 'up' ? '↑' : '↓'} ${c.change}
                    </span>
                </div>
                
                <div class="flex items-end gap-2 mb-2">
                    <span class="text-4xl font-bold text-[#A65233] cute-font">${c.history[5]}</span>
                    <span class="text-sm text-gray-400 mb-1 cute-font">分</span>
                </div>
                
                <div class="w-full bg-gray-100 rounded-full h-1.5 overflow-hidden mb-3">
                    <div class="bg-[#A65233] h-full rounded-full transition-all duration-1000" style="width: ${c.history[5]}%"></div>
                </div>
                
                <p class="text-xs text-gray-500 line-clamp-2">
                    ${getAnalysisText(c)}
                </p>
            </div>
        </div>
    `).join('');
}

        function getAnalysisText(c) {
            const score = c.history[5];
            if (score >= 90) return "🌟 该社区文明养宠氛围极佳，居民自觉性高，建议作为示范社区推广经验。";
            if (score >= 80) return "👍 整体表现良好，但在遛狗牵绳率等细节上仍有提升空间，建议加强宣传。";
            if (score >= 70) return "⚠️ 文明系数一般，近期存在零星违规事件，需关注环境卫生和噪音问题。";
            return "🚫 文明系数较低，近期违规投诉较多，建议加强巡查力度并开展专项整治行动。";
        }

        // 初始化
        fetchTrendData();
    </script>
    <script src="agent-widget.js"></script>
    <script src="page-transition.js"></script>
</body>
